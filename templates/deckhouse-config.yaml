# Deckhouse config (generated by Terraform from templates/deckhouse-config.yaml)
apiVersion: deckhouse.io/v1
kind: ClusterConfiguration
clusterType: Static
podSubnetCIDR: 10.111.0.0/16
serviceSubnetCIDR: 10.222.0.0/16
kubernetesVersion: "Automatic"
clusterDomain: "cluster.local"
defaultCRI: ContainerdV2
proxy:
  httpProxy: ${proxy_url}
  httpsProxy: ${proxy_url}
  noProxy:
    - ${subnet_cidr}
    - ${sslip_domain}
    - ".ru-central1.internal"
---
apiVersion: deckhouse.io/v1
kind: InitConfiguration
deckhouse:
  # Using public Deckhouse registry through proxy
  imagesRepo: ${deckhouse_images_repo}
  registryDockerCfg: ${deckhouse_registry_docker_cfg}
####################################
# MODULE CONFIGS
####################################
---
apiVersion: deckhouse.io/v1alpha1
kind: ModuleConfig
metadata:
  name: global
spec:
  version: 2
  settings:
    defaultClusterStorageClass: nfs
    modules:
      publicDomainTemplate: "%s.${sslip_domain}"
      https:
        certManager:
          # Use self-signed certificates for Deckhouse modules
          # Let's Encrypt is handled by bastion nginx (which has public IP)
          clusterIssuerName: selfsigned
      storageClass: nfs
---
apiVersion: deckhouse.io/v1alpha1
kind: ModuleConfig
metadata:
  name: deckhouse
spec:
  version: 1
  enabled: true
  settings:
    bundle: Default
    releaseChannel: ${release_channel}
    logLevel: Info
---
apiVersion: deckhouse.io/v1alpha1
kind: ModuleConfig
metadata:
  name: cni-cilium
spec:
  version: 1
  enabled: true
  settings:
    tunnelMode: VXLAN
---
apiVersion: deckhouse.io/v1alpha1
kind: ModuleConfig
metadata:
  name: user-authn
spec:
  version: 2
  enabled: true
  settings:
    controlPlaneConfigurator:
      dexCAMode: FromIngressSecret
    publishAPI:
      enabled: true
      https:
        mode: Global
---
apiVersion: deckhouse.io/v1alpha1
kind: ModuleConfig
metadata:
  name: cert-manager
spec:
  version: 1
  enabled: true
  settings:
    # Disable Let's Encrypt for master node (no public IP)
    # Let's Encrypt is handled by bastion nginx proxy
    disableLetsencrypt: true
---
# Some sort of hack of using sslip domain
apiVersion: deckhouse.io/v1alpha1
kind: ModuleConfig
metadata:
  name: kube-dns
spec:
  version: 1
  enabled: true
  settings:
    # Internal DNS resolution for Deckhouse services
    # All public domains resolve to master node for internal cluster access
    hosts:
    - domain: dex.${sslip_domain}
      ip: ${master_ip}
    - domain: grafana.${sslip_domain}
      ip: ${master_ip}
    - domain: dashboard.${sslip_domain}
      ip: ${master_ip}
    - domain: prometheus.${sslip_domain}
      ip: ${master_ip}
    - domain: status.${sslip_domain}
      ip: ${master_ip}
    - domain: kubeconfig.${sslip_domain}
      ip: ${master_ip}
    - domain: api.${sslip_domain}
      ip: ${master_ip}
    - domain: argocd.${sslip_domain}
      ip: ${master_ip}
    - domain: istio.${sslip_domain}
      ip: ${master_ip}
    - domain: neuvector.${sslip_domain}
      ip: ${master_ip}
    - domain: hubble.${sslip_domain}
      ip: ${master_ip}
    - domain: payload-registry.${sslip_domain}
      ip: ${master_ip}
    - domain: stronghold.${sslip_domain}
      ip: ${master_ip}
    - domain: commander.${sslip_domain}
      ip: ${master_ip}
---
apiVersion: deckhouse.io/v1alpha1
kind: ModuleConfig
metadata:
  name: registry
spec:
  enabled: true
---
apiVersion: deckhouse.io/v1alpha1
kind: ModuleConfig
metadata:
  name: chrony
spec:
  enabled: true
  settings:
    ntpServers:
      - ${bastion_fqdn}
  version: 1
---
apiVersion: deckhouse.io/v1alpha1
kind: ModuleConfig
metadata:
  name: console
spec:
  enabled: true
---
apiVersion: deckhouse.io/v1alpha1
kind: ModuleConfig
metadata:
  name: csi-nfs
spec:
  enabled: true
  version: 1
---
####################################
# STATIC AND MASTER NODEGROUP CONFIG
####################################
apiVersion: deckhouse.io/v1
kind: StaticClusterConfiguration
internalNetworkCIDRs:
- ${subnet_cidr}
---
apiVersion: deckhouse.io/v1
kind: NodeGroup
metadata:
  name: master
spec:
  disruptions:
    approvalMode: Automatic
  nodeTemplate:
    labels:
      node-role.kubernetes.io/control-plane: ""
      node-role.kubernetes.io/master: ""
    taints: []
  nodeType: Static
---
####################################
# OTHER CONFIGS
####################################
apiVersion: deckhouse.io/v1
kind: IngressNginxController
metadata:
  name: nginx
spec:
  ingressClass: nginx
  inlet: HostPort
  hostPort:
    httpPort: 80
    httpsPort: 443
  nodeSelector:
    node.deckhouse.io/group: master
  tolerations:
  - effect: NoSchedule
    key: node-role.kubernetes.io/control-plane
    operator: Exists
---
apiVersion: storage.deckhouse.io/v1alpha1
kind: NFSStorageClass
metadata:
  name: nfs
spec:
  connection:
    host: "${registry_fqdn}"
    nfsVersion: "4.2"
    share: "${registry_nfs_path}"
  volumeBindingMode: WaitForFirstConsumer
  reclaimPolicy: Delete
---
apiVersion: deckhouse.io/v1
kind: ClusterAuthorizationRule
metadata:
  name: admin
spec:
  subjects:
  - kind: Group
    name: admins
  accessLevel: SuperAdmin
  portForwarding: true
---
apiVersion: deckhouse.io/v1
kind: User
metadata:
  name: admin
spec:
  email: admin@deckhouse.io
  # echo "7md03yxgzt" | htpasswd -BinC 10 "" | cut -d: -f2 | base64 -w0
  password: 'JDJhJDEwJE5WNmJvRjBaQUJNbTgxNy52OEpEb3VTT0ZqOVoxMmVwT3RZSTllekREQnJFRTB1eGoubmtH'
---
apiVersion: deckhouse.io/v1alpha1
kind: Group
metadata:
  name: admins
spec:
  name: admins
  members:
    - kind: User
      name: admin
---
apiVersion: deckhouse.io/v1alpha1
kind: LocalPathProvisioner
metadata:
  name: localpath
spec:
  nodeGroups:
    - master
  path: "/opt/local-path-provisioner"
  reclaimPolicy: Delete
